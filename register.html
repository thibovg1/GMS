<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registreren - Intranet Regio 18</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="register-section" class="d-flex align-items-center justify-content-center vh-100 bg-light">
        <div class="card p-4 shadow-lg" style="width: 450px;">
            <h2 class="card-title text-center mb-4">Registreren voor Intranet Regio 18</h2>
            <form id="register-form">
                <div class="mb-3">
                    <label for="register-username" class="form-label">Gebruikersnaam</label>
                    <input type="text" class="form-control" id="register-username" required>
                    <div class="form-text">Minimaal 3 karakters.</div>
                </div>
                <div class="mb-3">
                    <label for="register-password" class="form-label">Wachtwoord</label>
                    <input type="password" class="form-control" id="register-password" required>
                    <div class="form-text">Minimaal 6 karakters.</div>
                </div>
                <div class="mb-3">
                    <label for="confirm-password" class="form-label">Herhaal Wachtwoord</label>
                    <input type="password" class="form-control" id="confirm-password" required>
                </div>
                <button type="submit" class="btn btn-success w-100">Account aanmaken</button>
                <div id="register-error" class="text-danger text-center mt-3 d-none"></div>
                <div id="register-success" class="text-success text-center mt-3 d-none">Registratie succesvol! U kunt nu <a href="index.html" class="alert-link">inloggen</a>.</div>
            </form>
            <div class="mt-3 text-center">
                <p>Al een account?</p>
                <a href="index.html" class="btn btn-outline-secondary w-100">Terug naar Login</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eGYC7PTY/LSXL0J" crossorigin="anonymous"></script>
    <script src="script.js"></script> 
</body>
</html>
