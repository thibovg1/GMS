<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMS Registreren</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjPz2wfQvO3sS/HgejokE/k9CgA/Yj5i5uWz/I4y2f5U1u/B2y3a2s/" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section id="register-section" class="vh-100 d-flex align-items-center justify-content-center bg-light">
        <div class="card p-4 shadow-lg" style="width: 25rem;">
            <h2 class="card-title text-center mb-4"><i class="fas fa-user-plus me-2"></i> Registreren</h2>
            <form id="register-form">
                <div class="mb-3">
                    <label for="register-username" class="form-label">Gebruikersnaam</label>
                    <input type="text" class="form-control" id="register-username" required>
                </div>
                <div class="mb-3">
                    <label for="register-password" class="form-label">Wachtwoord</label>
                    <input type="password" class="form-control" id="register-password" required>
                </div>
                <div class="mb-3">
                    <label for="confirm-password" class="form-label">Bevestig Wachtwoord</label>
                    <input type="password" class="form-control" id="confirm-password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100"><i class="fas fa-user-plus me-2"></i> Registreren</button>
                <div id="register-error" class="alert alert-danger mt-3 d-none" role="alert"></div>
                <div id="register-success" class="alert alert-success mt-3 d-none" role="alert"></div>
                <p class="mt-3 text-center">Al een account? <a href="index.html">Log hier in</a></p>
            </form>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhyMqrNxjC+pE9dY/H3c3s9rD/" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>
</html>
